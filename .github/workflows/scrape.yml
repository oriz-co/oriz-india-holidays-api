name: scrape
on:
  schedule:
    # Yearly: Jan 5 at 06:30 IST (01:00 UTC)
    - cron: "0 1 5 1 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm run scrape
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore(data): yearly holidays refresh"
            git push
          fi
